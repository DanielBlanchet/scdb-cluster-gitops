apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: scdb-gateway
  namespace: default
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 8000
      hostname: "*.test.home.dblanchet.net"
      allowedRoutes:
        namespaces:
          from: All
    - name: tls-prod-argocd
      protocol: TLS
      port: 8443
      hostname: "*.test.home.dblanchet.net"
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: All
