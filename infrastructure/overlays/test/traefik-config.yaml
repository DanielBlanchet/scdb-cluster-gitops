apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: traefik
spec:
  valuesContent: |-
    ports:
      web:
        nodePort: 30080
      websecure:
        nodePort: 30443
    providers:
      kubernetesGateway:
        enabled: true
        experimentalChannel: true
