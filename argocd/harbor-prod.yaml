apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor-prod
  namespace: argocd
spec:
  project: harbor
  source:
    repoURL: git@github.com:DanielBlanchet/scdb-cluster-gitops.git
    targetRevision: main
    path: apps/harbor/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
