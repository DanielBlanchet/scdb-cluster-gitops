apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-test-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:DanielBlanchet/scdb-cluster-gitops.git
    targetRevision: main
    path: apps/test-web/overlays/test
  destination:
    server: https://scdb-test.home.dblanchet.net:6443
    namespace: test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
