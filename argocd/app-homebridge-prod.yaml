apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crypto-trader-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:DanielBlanchet/scdb-cluster-gitops.git
    targetRevision: main
    path: apps/HomeBridge/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: homebridge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
