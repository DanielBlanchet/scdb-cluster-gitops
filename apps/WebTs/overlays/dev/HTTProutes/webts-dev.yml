apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-web-route
  namespace: test
spec:
  parentRefs:
    - name: scdb-gateway
      namespace: default
      sectionName: http
  hostnames:
    - webts.dev.home.dblanchet.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: webts-web-svc
          port: 8080
