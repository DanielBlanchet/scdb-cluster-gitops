apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: webts-web
  name: nginx-php
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: webts-web
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: webts-web
    spec:
      initContainers:
        - name: check-db-ready
          imagePullPolicy: IfNotPresent
          image: busybox
          command: ['sh', '-c', "until nc -zv webts-db-svc 3306; do echo waiting; sleep 5; done ; sleep 5"]
      containers:
      - env:
        - name: TZ
          value: America/Montreal
        - name: WebTS_DB
          value: webts-db-svc:3306
        - name: WebTS_USER
          value: webts
        - name: WebTS_PW
          value: tsweb
        image: harbor.home.dblanchet.net/scdb/nginx-php:v4.0.7
        imagePullPolicy: IfNotPresent
        name: nginx-php
        ports:
        - containerPort: 8052
          protocol: TCP
        - containerPort: 8443
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/appl
          name: config-cfg
          readOnly: true
#        - mountPath: /var/lib/appl/ssl
#          name: webts-ssl
#          readOnly: true
        - mountPath: /var/lib/appl/db
          name: db-info
          readOnly: true
      dnsPolicy: ClusterFirst
#      imagePullSecrets:
#      - name: docker-io-pull-secret
#      - name: harbor-pull-secret
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: config-cfg
        secret:
          defaultMode: 420
          secretName: webts-config-cfg
#      - name: webts-ssl
#        secret:
#          defaultMode: 420
#          secretName: webts-ssl
      - name: db-info
        secret:
          defaultMode: 420
          secretName: db-connection-info
