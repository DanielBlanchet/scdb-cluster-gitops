apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
spec:
  concurrencyPolicy: Allow
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      creationTimestamp: null
    spec:
      template:
        metadata:
          creationTimestamp: null
        spec:
          containers:
          - command:
            - /bin/sh
            - -c
            - /backup-db.sh
            env:
            - name: MYSQL_ROOT_PASSWORD
              value: test
            - name: GRACEDAYS
              value: "5"
            image: harbor.home.dblanchet.net/scdb/mysql-cluster:v3.5.1
            name: mysql-backup
            resources: {}
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
            volumeMounts:
            - mountPath: /var/backups/mysql
              name: backup-db
            - mountPath: /root
              name: my-cnf-backup
              readOnly: true
            - mountPath: /backup-db.sh
              name: backup-db-sh
              subPath: backup-db.sh
          dnsPolicy: ClusterFirst
          restartPolicy: OnFailure
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
          volumes:
          - name: backup-db
            persistentVolumeClaim:
              claimName: db-backup
          - name: my-cnf-backup
            secret:
              defaultMode: 420
              secretName: my-cnf-backup
          - configMap:
              defaultMode: 420
              items:
              - key: backup-db.sh
                mode: 493
                path: backup-db.sh
              name: backup-db-sh
            name: backup-db-sh
  schedule: 0 0/8 * * *
  successfulJobsHistoryLimit: 1
  suspend: true
