apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crypto-scdb-secure-prod
  namespace: crypto-trader
spec:
  parentRefs:
    - name: scdb-gateway
      namespace: default
      sectionName: https-prod-crypto-scdb
  hostnames:
    - crypto-scdb.prod.home.dblanchet.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: crypto-web-svc
          port: 80
