apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor-secure-route
  namespace: argocd
spec:
  parentRefs:
    - name: scdb-gateway
      namespace: default
      sectionName: https-prod-argocd
  hostnames:
    - argocd.prod.home.dblanchet.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 443
