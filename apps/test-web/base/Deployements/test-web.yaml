apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: test-web
    app.kubernetes.io/name: test-web
  name: test-web
spec:
  progressDeadlineSeconds: 120
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: test-web
  strategy:
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: test-web
        app.kubernetes.io/name: test-web
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                - test-web
            topologyKey: "kubernetes.io/hostname"
      initContainers:
      - name: fix-ownership
        image: busybox:1.36
        command: ["sh", "-c", "chown -Rvf 101:101 /var/nginx || true"]
        volumeMounts:
        - name: html
          mountPath: /var/nginx/html
      containers:
      - image: nginx:latest
        imagePullPolicy: IfNotPresent
        name: nginx
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - name: html
          mountPath: /var/nginx/html
        - name: default-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: nginx-conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: index-html
          mountPath: /var/nginx/html/index.html
          subPath: index.html
      nodeSelector:
        kubernetes.io/os: linux
        node-role.kubernetes.io/worker: worker
#      imagePullSecrets:
#      - name: docker-io-pull-secret
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 300
      volumes:
        - name: html
          persistentVolumeClaim:
            claimName: html
        - name: default-conf
          configMap:
            name: default-conf
            items:
            - key: default.conf
              path: default.conf
        - name: nginx-conf
          configMap:
            name: nginx-conf
            items:
            - key: nginx.conf
              path: nginx.conf
        - name: index-html
          configMap:
            name: index-html
            items:
            - key: index.html
              path: index.html
