apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-web-route
  namespace: test
spec:
  parentRefs:
    - name: scdb-gateway
      namespace: default
      sectionName: http
  hostnames:
    - test-web.test.home.dblanchet.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: test-web-svc
          port: 80
